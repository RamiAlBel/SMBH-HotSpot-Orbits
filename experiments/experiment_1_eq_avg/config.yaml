experiment:
  name: "experiment_1_eq_avg"
  description: "Equatorial orbits with averaged DPA"
  
data:
  dataset_path: "data/processed/dpa_dataset_i0.csv"
  experiment_type: "avg"
  
targets:
  - name: "spin"
    column: "a"
    convert_to_radians: false
  - name: "incl"
    column: "i"
    convert_to_radians: false
    
noise:
  enabled: true
  sigma_r: 0.1
  sigma_T: 2.0
  sigma_DPA: 5.0
  
model:
  hidden_dims: [256, 256]
  num_blocks: 2
  dropout: 0.1
  
training:
  batch_size: 1024
  epochs: 200
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stop_patience: 15
  seeds: [42, 43, 44]
  use_wandb: true
  wandb_project: "exp I"
  
split:
  train: 0.8
  val: 0.1
  test: 0.1
  random_seed: 42
