experiment:
  name: "experiment_7_noneq_noise_sweep"
  description: "Non-equatorial full orbit — sweep over sigma_r, sigma_T, sigma_DPA to map noise propagation"

data:
  dataset_path: "data/processed/dpa_dataset_noneq.csv"
  experiment_type: "timeseries"
  num_samples: 10
  half_orbit: false

targets:
  - name: "spin"
    column: "a"
    convert_to_radians: false
  - name: "incl"
    column: "i"
    convert_to_radians: true
  - name: "theta"
    column: "theta"
    convert_to_radians: true
  - name: "z"
    column: "z"
    convert_to_radians: false

noise:
  enabled: true
  # Actual values are injected per-combo by train.py; these are placeholders
  sigma_r: 0.1
  sigma_T: 2.0
  sigma_DPA: 5.0
  dpa_length_scale: 0.3

model:
  hidden_dims: [256, 256]
  num_blocks: 2
  dropout: 0.1

training:
  batch_size: 1024
  epochs: 500
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stop_patience: 40
  seeds: [42]
  use_wandb: false

split:
  train: 0.8
  val: 0.1
  test: 0.1
  random_seed: 42

# Noise sweep grid — 5x5x5 = 125 combos (indexed 0..124)
sweep:
  sigma_T_values:   [0.0, 0.5, 1.0, 1.5, 2.0]   # minutes
  sigma_r_values:   [0.0, 0.1, 0.5, 1.0, 2.0]   # units M
  sigma_DPA_values: [0.0, 2.5, 5.0, 10.0, 20.0]  # degrees
